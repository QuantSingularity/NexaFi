---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-config
  namespace: nexafi-infra
data:
  kibana.yml: |
    server.name: nexafi-kibana
    server.host: "0.0.0.0"
    server.port: 5601
    server.maxPayload: 1048576
    elasticsearch.hosts: ["http://elasticsearch-service.nexafi-infra.svc.cluster.local:9200"]
    elasticsearch.username: "${ELASTICSEARCH_USERNAME}"
    elasticsearch.password: "${ELASTICSEARCH_PASSWORD}"
    elasticsearch.requestTimeout: 30000
    xpack.security.enabled: true
    xpack.encryptedSavedObjects.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
    xpack.reporting.encryptionKey: "${KIBANA_REPORTING_KEY}"
    xpack.security.encryptionKey: "${KIBANA_SECURITY_KEY}"
    monitoring.ui.container.elasticsearch.enabled: true
    logging.appenders.default.type: console
    logging.appenders.default.layout.type: json
    logging.root.level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: nexafi-infra
  labels:
    app: kibana
    tier: logging
    app.kubernetes.io/part-of: nexafi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
        tier: logging
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_USERNAME
              value: "elastic"
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: elasticsearch-password
            - name: KIBANA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: kibana-encryption-key
            - name: KIBANA_REPORTING_KEY
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: kibana-reporting-key
            - name: KIBANA_SECURITY_KEY
              valueFrom:
                secretKeyRef:
                  name: nexafi-secrets
                  key: kibana-security-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 18
          volumeMounts:
            - name: kibana-config
              mountPath: /usr/share/kibana/config/kibana.yml
              subPath: kibana.yml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: kibana-config
          configMap:
            name: kibana-config
---
apiVersion: v1
kind: Service
metadata:
  name: kibana-service
  namespace: nexafi-infra
  labels:
    app: kibana
spec:
  selector:
    app: kibana
  ports:
    - protocol: TCP
      port: 5601
      targetPort: 5601
      name: http
  type: ClusterIP
