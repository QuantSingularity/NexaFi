---
# Kubernetes Secrets Template for NexaFi
# DO NOT commit actual secrets to version control.
# Use external secret management (AWS Secrets Manager + External Secrets Operator) in production.
#
# To generate base64 values:
#   echo -n "your-value" | base64
# To generate secure keys:
#   openssl rand -base64 32 | tr -d "\n" | base64
#   openssl rand -hex 32 | base64

apiVersion: v1
kind: Secret
metadata:
  name: nexafi-secrets
  namespace: nexafi
type: Opaque
data:
  user-db-url: <BASE64_ENCODED_USER_DB_URL>
  ledger-db-url: <BASE64_ENCODED_LEDGER_DB_URL>
  payment-db-url: <BASE64_ENCODED_PAYMENT_DB_URL>
  ai-db-url: <BASE64_ENCODED_AI_DB_URL>
  analytics-db-url: <BASE64_ENCODED_ANALYTICS_DB_URL>
  credit-db-url: <BASE64_ENCODED_CREDIT_DB_URL>
  document-db-url: <BASE64_ENCODED_DOCUMENT_DB_URL>
  jwt-secret: <BASE64_ENCODED_JWT_SECRET_MIN_64_CHARS>
  stripe-secret: <BASE64_ENCODED_STRIPE_SECRET>
  paypal-secret: <BASE64_ENCODED_PAYPAL_SECRET>
  openai-api-key: <BASE64_ENCODED_OPENAI_API_KEY>
  # Prefer IRSA over static credentials. Only use if IRSA unavailable.
  # aws-access-key: <BASE64_ENCODED_AWS_ACCESS_KEY>
  # aws-secret-key: <BASE64_ENCODED_AWS_SECRET_KEY>
  s3-bucket-name: <BASE64_ENCODED_S3_BUCKET_NAME>
---
apiVersion: v1
kind: Secret
metadata:
  name: nexafi-secrets
  namespace: nexafi-infra
type: Opaque
data:
  rabbitmq-password: <BASE64_ENCODED_RABBITMQ_PASSWORD_MIN_32_CHARS>
  # Must be the same across all RabbitMQ nodes - generate once with: openssl rand -hex 32
  rabbitmq-erlang-cookie: <BASE64_ENCODED_RABBITMQ_ERLANG_COOKIE>
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD_MIN_32_CHARS>
  elasticsearch-password: <BASE64_ENCODED_ELASTICSEARCH_PASSWORD_MIN_16_CHARS>
  # Each Kibana key must be at least 32 characters
  kibana-encryption-key: <BASE64_ENCODED_KIBANA_ENCRYPTION_KEY_32_CHARS>
  kibana-reporting-key: <BASE64_ENCODED_KIBANA_REPORTING_KEY_32_CHARS>
  kibana-security-key: <BASE64_ENCODED_KIBANA_SECURITY_KEY_32_CHARS>
