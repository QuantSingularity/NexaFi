---
# PodDisruptionBudgets - ensure high availability during node drains and rolling updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: nexafi
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: user-service-pdb
  namespace: nexafi
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-service
