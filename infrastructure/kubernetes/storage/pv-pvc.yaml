---
# StorageClass for dynamic provisioning - GP3 EBS on EKS
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nexafi-gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  encrypted: "true"
  kmsKeyId: "alias/nexafi-prod-primary"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Retain
---
# High-performance StorageClass for financial data
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nexafi-gp3-high-perf
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "16000"
  throughput: "1000"
  encrypted: "true"
  kmsKeyId: "alias/nexafi-prod-primary"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Retain
---
# Persistent Volume Claims - dynamic provisioning via StorageClass
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-service-pvc
  namespace: nexafi
  labels:
    app: user-service
spec:
  storageClassName: nexafi-gp3
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
